<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Administration | MadaVoyages</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@200;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        :root {
            --color-primary: #000c09;
            --color-secondary: #a53c19;
            --color-surface-cream: #fbf9f5;
            --color-text-variant: #414846;
            
            --font-display: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        html, body {
            background-color: var(--color-surface-cream);
            color: var(--color-primary);
            font-family: var(--font-body);
            min-height: 100vh;
        }

        .magical-bg::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.08; pointer-events: none; z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .font-display { font-family: var(--font-display); }
        .letter-magical { letter-spacing: 0.12em; }
        .label-caps { font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.15em; }

        .glass-nav {
            background: rgba(251, 249, 245, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(165, 60, 25, 0.08);
            z-index: 1030;
        }

        .btn-premium {
            background-color: var(--color-primary); color: #fff;
            font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.15em;
            padding: 10px 24px; border-radius: 50px; border: none;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 15px rgba(0, 12, 9, 0.15);
        }
        .btn-premium:hover { background-color: var(--color-secondary); color: #fff; transform: translateY(-2px); }

        .admin-card {
            background: #fff; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(165, 60, 25, 0.05); overflow: hidden;
            margin-bottom: 2rem;
        }
        
        .table-custom thead th {
            background-color: #f5eee5; color: var(--color-primary);
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
            border-bottom: 2px solid rgba(165, 60, 25, 0.1); padding: 1rem;
        }
        .table-custom tbody td {
            font-size: 13px; vertical-align: middle; padding: 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .form-control, .form-select {
            background-color: #f5eee5; border: 1px solid transparent; border-radius: 8px;
            font-size: 13px; color: var(--color-primary); padding: 0.75rem 1rem;
        }
        .form-control:focus, .form-select:focus {
            background-color: #fff; border-color: var(--color-secondary);
            box-shadow: 0 0 0 0.2rem rgba(165, 60, 25, 0.15);
        }
        
        .circuit-img-preview { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; }
        
        .nav-tabs-custom .nav-link {
            color: var(--color-primary); border: none; font-weight: 600; font-size: 13px; padding: 1rem 1.5rem;
        }
        .nav-tabs-custom .nav-link.active {
            color: var(--color-secondary); background: transparent; border-bottom: 3px solid var(--color-secondary);
        }
    </style>
</head>
<body class="magical-bg">

    <!-- NAVIGATION -->
    <header class="fixed-top glass-nav">
        <nav class="navbar navbar-expand-lg py-2 py-lg-3">
            <div class="container-fluid px-4">
                <a class="navbar-brand font-display italic letter-magical fw-bold text-dark fs-5" href="index.html">
                    MadaVoyages <span class="fs-6 text-secondary ms-2" style="font-family: var(--font-body); font-style: normal;">| Panel Admin</span>
                </a>
                <div class="d-flex gap-3 align-items-center">
                    <span class="label-caps text-muted d-none d-md-inline" id="admin-name">Chargement...</span>
                    <a href="index.html" class="btn btn-outline-dark rounded-pill px-3 py-2 label-caps" style="font-size: 9px;">Retour au site</a>
                    <button id="logout-btn" class="btn btn-danger rounded-pill px-3 py-2 label-caps border-0" style="font-size: 9px;">Déconnexion</button>
                </div>
            </div>
        </nav>
    </header>

    <main style="margin-top: 100px;" class="container-fluid px-4 pb-5">
        
        <!-- Onglets de Navigation Principale -->
        <ul class="nav nav-tabs nav-tabs-custom mb-4 border-bottom" id="adminTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="circuits-tab" data-bs-toggle="tab" data-bs-target="#circuits-pane" type="button" role="tab">Gestion des Circuits</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="reservations-tab" data-bs-toggle="tab" data-bs-target="#reservations-pane" type="button" role="tab" id="btn-load-reservations">Réservations Clients</button>
            </li>
        </ul>

        <div class="tab-content" id="adminTabsContent">
            <!-- PANE 1: CIRCUITS -->
            <div class="tab-pane fade show active" id="circuits-pane" role="tabpanel">
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <span class="label-caps text-secondary mb-1 d-block">Catalogue</span>
                        <h2 class="font-display fw-bold text-dark mb-0">Circuits Touristiques</h2>
                    </div>
                    <button class="btn-premium d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#circuitModal" id="btn-add-circuit">
                        <span class="material-symbols-outlined fs-6">add</span> Nouveau Circuit
                    </button>
                </div>

                <div class="admin-card">
                    <div class="table-responsive">
                        <table class="table table-hover table-custom">
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Titre</th>
                                    <th>Prix (€ / MGA)</th>
                                    <th>Capacité</th>
                                    <th>Dates</th>
                                    <th>Statut</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="circuits-tbody">
                                <tr><td colspan="7" class="text-center py-4">Chargement...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- PANE 2: RESERVATIONS -->
            <div class="tab-pane fade" id="reservations-pane" role="tabpanel">
                <div class="mb-4">
                    <span class="label-caps text-secondary mb-1 d-block">Suivi en direct</span>
                    <h2 class="font-display fw-bold text-dark mb-0">Réservations Reçues</h2>
                </div>

                <div class="admin-card">
                    <div class="table-responsive">
                        <table class="table table-hover table-custom">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Client</th>
                                    <th>Circuit</th>
                                    <th>Places</th>
                                    <th>Date Demande</th>
                                    <th>Statut</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="reservations-tbody">
                                <tr><td colspan="7" class="text-center py-4">Aucune réservation chargée.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL CIRCUIT (AJOUT/EDITION) -->
    <div class="modal fade" id="circuitModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0" style="background-color: var(--color-surface-cream);">
                <div class="modal-header border-bottom border-warning">
                    <h5 class="modal-title font-display fw-bold text-dark fs-4" id="modalTitle">Ajouter un circuit</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
                </div>
                <form id="circuitForm">
                    <div class="modal-body p-4 row g-3">
                        <input type="hidden" id="circuitId">
                        
                        <div class="col-md-12">
                            <label class="label-caps text-dark mb-1 d-block" style="font-size: 9px;">Titre du circuit *</label>
                            <input type="text" id="title" name="title" class="form-control" required>
                        </div>
                        <div class="col-md-12">
                            <label class="label-caps text-dark mb-1 d-block" style="font-size: 9px;">Description *</label>
                            <textarea id="description" name="description" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="col-md-4">
                            <label class="label-caps text-dark mb-1 d-block" style="font-size: 9px;">Prix (€) *</label>
                            <input type="number" id="price" name="price" class="form-control" step="0.01" required>
                        </div>
                        <div class="col-md-4">
                            <label class="label-caps text-dark mb-1 d-block" style="font-size: 9px;">Prix (Ariary) *</label>
                            <input type="number" id="price_ariary" name="price_ariary" class="form-control" step="0.01" required>
                        </div>
                        <div class="col-md-4">
                            <label class="label-caps text-dark mb-1 d-block" style="font-size: 9px;">Capacité (Places) *</label>
                            <input type="number" id="capacity" name="capacity" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="label-caps text-dark mb-1 d-block" style="font-size: 9px;">Début du voyage</label>
                            <input type="date" id="date_debut_voyage" name="date_debut_voyage" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="label-caps text-dark mb-1 d-block" style="font-size: 9px;">Fin du voyage</label>
                            <input type="date" id="date_fin_voyage" name="date_fin_voyage" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="label-caps text-dark mb-1 d-block" style="font-size: 9px;">Fin des réservations</label>
                            <input type="date" id="date_fin_reservation" name="date_fin_reservation" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="label-caps text-dark mb-1 d-block" style="font-size: 9px;">Type de transport</label>
                            <select id="type_transport" name="type_transport" class="form-select">
                                <option value="">Sélectionner...</option>
                                <option value="Bus-Brousse Prestige">Bus-Brousse Prestige</option>
                                <option value="4x4 Expédition">4x4 Expédition</option>
                                <option value="Avion + Bateau">Avion + Bateau</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="label-caps text-dark mb-1 d-block" style="font-size: 9px;">Image (Optionnel)</label>
                            <input type="file" id="image" name="image" class="form-control" accept="image/*">
                        </div>
                        <div class="col-md-12 mt-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch" id="actif" checked>
                                <label class="form-check-label label-caps text-dark" for="actif" style="font-size: 10px;">Circuit Actif (Visible)</label>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-top border-warning">
                        <button type="button" class="btn btn-outline-dark rounded-pill px-4 label-caps" data-bs-dismiss="modal">Annuler</button>
                        <button type="submit" class="btn-premium border-0" id="btn-save-circuit">ENREGISTRER</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const userRaw = localStorage.getItem('user');

            if (!token || !userRaw) {
                window.location.href = 'admin-login.html';
                return;
            }

            const user = JSON.parse(userRaw);
            if (user.role !== 'admin') {
                alert("Accès refusé.");
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('admin-name').textContent = `Admin: ${user.prenom} ${user.nom}`;

            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            });

            // --- LOGIQUE CIRCUITS ---
            const circuitsTbody = document.getElementById('circuits-tbody');
            const circuitForm = document.getElementById('circuitForm');
            const circuitModal = new bootstrap.Modal(document.getElementById('circuitModal'));
            let isEditing = false;

            const loadCircuits = async () => {
                try {
                    const response = await fetch('/api/circuits?all=true', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await response.json();
                    if (!result.success) throw new Error(result.error);
                    
                    circuitsTbody.innerHTML = '';
                    result.data.forEach(c => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><img src="${c.image_url || '/assets/baobab3.webp'}" class="circuit-img-preview"></td>
                            <td class="fw-bold">${c.title}</td>
                            <td>${parseFloat(c.price).toFixed(2)} €<br><span class="text-muted small">${parseFloat(c.price_ariary).toLocaleString()} Ar</span></td>
                            <td>${c.capacity} places</td>
                            <td class="small">D: ${c.date_debut_voyage ? new Date(c.date_debut_voyage).toLocaleDateString() : 'N/A'}</td>
                            <td><span class="badge ${c.actif ? 'bg-success' : 'bg-secondary'} rounded-pill">${c.actif ? 'Actif' : 'Inactif'}</span></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-primary btn-edit rounded-circle p-1 me-1" data-id="${c.id}"><span class="material-symbols-outlined" style="font-size:16px;">edit</span></button>
                                <button class="btn btn-sm btn-outline-danger btn-delete rounded-circle p-1" data-id="${c.id}"><span class="material-symbols-outlined" style="font-size:16px;">delete</span></button>
                            </td>
                        `;
                        circuitsTbody.appendChild(tr);
                    });
                    attachCircuitEvents();
                } catch (e) { circuitsTbody.innerHTML = `<tr><td colspan="7" class="text-danger text-center">Erreur.</td></tr>`; }
            };

            const attachCircuitEvents = () => {
                document.querySelectorAll('.btn-edit').forEach(b => b.addEventListener('click', e => openEditModal(e.currentTarget.dataset.id)));
                document.querySelectorAll('.btn-delete').forEach(b => b.addEventListener('click', e => {
                    if(confirm('Supprimer ce circuit ?')) deleteCircuit(e.currentTarget.dataset.id);
                }));
            };

            document.getElementById('btn-add-circuit').addEventListener('click', () => {
                isEditing = false; circuitForm.reset(); document.getElementById('circuitId').value = '';
                document.getElementById('modalTitle').textContent = 'Ajouter un circuit';
            });

            const openEditModal = async (id) => {
                const response = await fetch(`/api/circuits/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const r = await response.json();
                if(r.success) {
                    isEditing = true;
                    document.getElementById('modalTitle').textContent = 'Modifier le circuit';
                    document.getElementById('circuitId').value = r.data.id;
                    document.getElementById('title').value = r.data.title;
                    document.getElementById('description').value = r.data.description;
                    document.getElementById('price').value = r.data.price;
                    document.getElementById('price_ariary').value = r.data.price_ariary;
                    document.getElementById('capacity').value = r.data.capacity;
                    document.getElementById('type_transport').value = r.data.type_transport || '';
                    document.getElementById('actif').checked = r.data.actif;
                    circuitModal.show();
                }
            };

            circuitForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const fd = new FormData();
                const fields = ['title', 'description', 'price', 'price_ariary', 'capacity', 'type_transport', 'date_debut_voyage', 'date_fin_voyage', 'date_fin_reservation'];
                fields.forEach(f => { if(document.getElementById(f).value) fd.append(f, document.getElementById(f).value); });
                fd.append('actif', document.getElementById('actif').checked);
                
                const img = document.getElementById('image').files[0];
                if(img) fd.append('image', img);

                const id = document.getElementById('circuitId').value;
                const url = isEditing ? `/api/circuits/${id}` : '/api/circuits';
                await fetch(url, { method: isEditing ? 'PUT' : 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: fd });
                circuitModal.hide(); loadCircuits();
            });

            const deleteCircuit = async (id) => {
                await fetch(`/api/circuits/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                loadCircuits();
            };

            // --- LOGIQUE RÉSERVATIONS ---
            const resTbody = document.getElementById('reservations-tbody');
            
            const loadReservations = async () => {
                try {
                    const response = await fetch('/api/reservations', { headers: { 'Authorization': `Bearer ${token}` } });
                    const result = await response.json();
                    if(!result.success) throw new Error();

                    resTbody.innerHTML = '';
                    if(result.data.length === 0) {
                        resTbody.innerHTML = '<tr><td colspan="7" class="text-center">Aucune réservation pour le moment.</td></tr>';
                        return;
                    }

                    result.data.forEach(r => {
                        const tr = document.createElement('tr');
                        let badgeColor = 'bg-warning';
                        if(r.status === 'confirme') badgeColor = 'bg-success';
                        if(r.status === 'annule') badgeColor = 'bg-danger';

                        tr.innerHTML = `
                            <td>#${r.id}</td>
                            <td>${r.user_name || 'Client'} <br><span class="text-muted small">${r.user_email || ''}</span></td>
                            <td class="fw-bold">${r.circuit_title}</td>
                            <td>${r.places_reservees}</td>
                            <td>${new Date(r.created_at).toLocaleDateString()}</td>
                            <td><span class="badge ${badgeColor} rounded-pill">${r.status}</span></td>
                            <td class="text-end">
                                ${r.status === 'en_attente' ? `
                                    <button class="btn btn-sm btn-success btn-action-res me-1" data-id="${r.id}" data-action="confirme">Valider</button>
                                    <button class="btn btn-sm btn-outline-danger btn-action-res" data-id="${r.id}" data-action="annule">Refuser</button>
                                ` : '<span class="text-muted small">Traité</span>'}
                            </td>
                        `;
                        resTbody.appendChild(tr);
                    });
                    attachReservationEvents();
                } catch(e) { resTbody.innerHTML = '<tr><td colspan="7" class="text-danger text-center">Erreur de chargement.</td></tr>'; }
            };

            const attachReservationEvents = () => {
                document.querySelectorAll('.btn-action-res').forEach(b => b.addEventListener('click', async (e) => {
                    const id = e.target.dataset.id;
                    const action = e.target.dataset.action;
                    if(confirm(`Changer le statut de la réservation en "${action}" ?`)) {
                        await fetch(`/api/reservations/${id}/status`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ status: action })
                        });
                        loadReservations();
                    }
                }));
            };

            // Écouter le clic sur l'onglet réservations
            document.getElementById('reservations-tab').addEventListener('click', loadReservations);

            // Init au lancement
            loadCircuits();
        });
    </script>
</body>
</html>
