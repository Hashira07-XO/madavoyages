<!DOCTYPE html>
<html lang="fr" class="h-100">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MadaVoyages | Rejoindre l'Aventure</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        /* Palette Chromatique Soft & Contrastée */
        :root {
            --color-primary: #051613;       
            --color-secondary: #b5431c;     
            --color-soft-peach: #ffe5c9;    
            --color-surface-cream: #faf7f2; 
            --color-input-bg: #f5f0e6;      
            
            --font-display: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            background-color: var(--color-surface-cream);
            color: var(--color-primary);
            font-family: var(--font-body);
        }

        .magical-bg::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.06;
            pointer-events: none;
            z-index: 10;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .font-display { font-family: var(--font-display); }
        .letter-magical { letter-spacing: 0.12em; }
        .label-caps { font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.15em; color: var(--color-primary); opacity: 0.8; }
        
        .split-container {
            height: 100vh;
            display: flex;
            flex-direction: row;
        }

        .illustration-panel {
            width: 60%;
            background: linear-gradient(135deg, #fbf0e0 0%, #ffe5c9 50%, #f7dfc1 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            border-right: 1px solid rgba(181, 67, 28, 0.08);
        }

        .form-panel {
            width: 40%;
            background-color: var(--color-surface-cream);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            padding: 3rem 4%;
            overflow-y: auto;
        }

        @media (max-width: 991.98px) {
            html, body {
                max-height: none;
                overflow: auto;
            }
            .split-container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }
            .illustration-panel {
                display: none !important;
            }
            .form-panel {
                width: 100% !important;
                min-height: 100vh;
                padding: 3rem 2rem;
            }
        }

        .form-control-soft {
            background-color: var(--color-input-bg);
            border: 1.5px solid rgba(5, 22, 19, 0.08);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--color-primary);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .form-control-soft::placeholder {
            color: rgba(5, 22, 19, 0.4);
        }
        .form-control-soft:focus {
            background-color: #fff;
            border-color: var(--color-secondary);
            box-shadow: 0 0 0 4px rgba(181, 67, 28, 0.1);
            outline: none;
        }

        .btn-premium {
            background-color: var(--color-primary);
            color: #fff;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.15em;
            padding: 14px;
            border-radius: 12px;
            border: none;
            transition: transform 0.2s ease, background-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(5, 22, 19, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-premium:hover:not(:disabled) {
            background-color: var(--color-secondary);
            box-shadow: 0 8px 20px rgba(181, 67, 28, 0.3);
            transform: translateY(-1px);
        }
        .btn-premium:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background-color: var(--color-primary);
        }

        .text-link-contrast {
            color: var(--color-secondary);
            font-weight: 700;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .text-link-contrast:hover {
            color: var(--color-primary);
            text-decoration: underline;
        }

        .watermark-subtle {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            font-family: var(--font-display);
            font-size: 5rem;
            font-weight: 900;
            color: rgba(181, 67, 28, 0.03);
            pointer-events: none;
            user-select: none;
        }

        .firefly-container { position: absolute; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
        .firefly {
            position: absolute; width: 4px; height: 4px; background: #b0d4cc; border-radius: 50%;
            box-shadow: 0 0 8px #b0d4cc; opacity: 0; animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(105%) translateX(0); opacity: 0; }
            30% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-5%) translateX(15px); opacity: 0; }
        }

        .alert-premium-success {
            background-color: rgba(176, 212, 204, 0.25);
            border: 1px solid rgba(5, 22, 19, 0.1);
            color: var(--color-primary);
            border-radius: 12px;
        }
    </style>
</head>
<body class="magical-bg">

    <div class="split-container">
        
        <div class="illustration-panel">
            <div class="firefly-container" id="firefly-container"></div>
            
            <a href="index.html" class="position-absolute top-0 start-0 m-4 label-caps text-decoration-none d-flex align-items-center gap-1" style="z-index: 5;">
                <span class="material-symbols-outlined" style="font-weight: 700; font-size: 14px;">arrow_back</span> Retour au site
            </a>

            <div class="position-relative w-100" style="max-width: 320px;">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="w-100 h-auto">
                    <circle cx="100" cy="110" r="50" fill="url(#sunGradient)" opacity="0.8"/>
                    
                    <path d="M -20 160 Q 50 130 130 155 T 220 145 L 220 210 L -20 210 Z" fill="#fcf6ed" opacity="0.9"/>
                    <path d="M -20 175 Q 70 155 160 170 T 220 165 L 220 210 L -20 210 Z" fill="var(--color-surface-cream)"/>
                    
                    <path d="M 94 175 Q 94 135 90 120 Q 86 108 96 102 Q 104 102 110 108 Q 106 120 106 135 Q 106 175 106 175 Z" fill="var(--color-secondary)" opacity="0.85"/>
                    <circle cx="86" cy="98" r="14" fill="var(--color-secondary)" opacity="0.75"/>
                    <circle cx="100" cy="94" r="16" fill="var(--color-secondary)" opacity="0.6"/>
                    <circle cx="114" cy="100" r="12" fill="var(--color-secondary)" opacity="0.75"/>

                    <path d="M 40 60 Q 44 57 48 60 Q 52 57 56 60" fill="none" stroke="var(--color-secondary)" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
                    <path d="M 145 75 Q 148 72 151 75 Q 154 72 157 75" fill="none" stroke="var(--color-secondary)" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

                    <defs>
                        <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#f59e6c" stop-opacity="0.6"/>
                            <stop offset="100%" stop-color="#ffe5c9" stop-opacity="0"/>
                        </radialGradient>
                    </defs>
                </svg>

                <div class="text-center mt-3">
                    <h3 class="font-display italic fw-bold mb-1" style="font-size: 24px;">MadaVoyages</h3>
                    <p class="text-muted small mb-0" style="font-size: 13px; line-height: 1.5;">Laissez-vous guider au cœur de paysages d'exception.</p>
                </div>
            </div>
        </div>

        <div class="form-panel">
            <a href="index.html" class="d-lg-none label-caps text-decoration-none d-flex align-items-center gap-1 mb-4">
                <span class="material-symbols-outlined fs-6" style="font-weight: 700;">arrow_back</span> Retour au site
            </a>

            <div class="mb-4">
                <span class="label-caps text-secondary d-block mb-1">Espace Membre</span>
                <h2 id="form-title" class="font-display fw-bold display-6 mb-2" style="font-size: 28px;">Rejoignez l'Aventure</h2>
                <p id="form-subtitle" class="text-muted small mb-0" style="font-size: 13px;">Créez votre compte pour commencer à concevoir vos voyages d'exception.</p>
            </div>

            <div id="auth-error-message" class="alert alert-danger d-none py-2 px-3 mb-3 small" role="alert" style="border-radius: 10px;"></div>
            <div id="auth-success-message" class="alert alert-premium-success d-none py-3 px-3 mb-3 small" role="alert"></div>

            <form id="auth-form" class="d-flex flex-column gap-3">
                <input type="hidden" id="action-type" name="action_type" value="signup">

                <div id="signup-fields" class="row g-3 g-lg-2">
                    <div class="col-12 col-lg-6">
                        <label for="nom" class="label-caps mb-1 d-block">Nom</label>
                        <input type="text" id="nom" name="nom" class="form-control-soft w-100" placeholder="Dupont" required>
                    </div>
                    <div class="col-12 col-lg-6">
                        <label for="prenom" class="label-caps mb-1 d-block">Prénom</label>
                        <input type="text" id="prenom" name="prenom" class="form-control-soft w-100" placeholder="Jean" required>
                    </div>
                </div>

                <div>
                    <label for="auth-email" class="label-caps mb-1 d-block">Adresse e-mail</label>
                    <input type="email" id="auth-email" name="email" class="form-control-soft w-100" placeholder="nom@exemple.com" required>
                </div>

                <div>
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label for="auth-password" class="label-caps mb-0">Mot de passe</label>
                        <a href="#" id="forgot-password-link" class="text-link-contrast d-none" style="font-size: 11px;">Oublié ?</a>
                    </div>
                    <input type="password" id="auth-password" name="password" class="form-control-soft w-100" placeholder="••••••••" required>
                </div>

                <button type="submit" id="submit-btn" class="btn-premium w-100 mt-2">
                    <span id="btn-text">Créer mon compte</span>
                    <div id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status"></div>
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted mb-0" style="font-size: 12.5px;">
                    <span id="toggle-text">Déjà membre ?</span> 
                    <button id="toggle-form-btn" class="btn btn-link p-0 text-link-contrast fw-bold text-decoration-none border-0 align-baseline" style="font-size: 12.5px;">
                        Se connecter
                    </button>
                </p>
            </div>

            <div class="watermark-subtle">MADA</div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            const fContainer = document.getElementById('firefly-container');
            function addFirefly() {
                if (!fContainer || fContainer.children.length > 12) return;
                const f = document.createElement('div');
                f.className = 'firefly';
                f.style.left = Math.random() * 100 + '%';
                f.style.animationDuration = (Math.random() * 6 + 7) + 's';
                fContainer.appendChild(f);
                setTimeout(() => f.remove(), 12000);
            }
            if (fContainer) setInterval(addFirefly, 1500);

            const toggleBtn = document.getElementById('toggle-form-btn');
            const formTitle = document.getElementById('form-title');
            const formSubtitle = document.getElementById('form-subtitle');
            const toggleText = document.getElementById('toggle-text');
            const signupFields = document.getElementById('signup-fields');
            const forgotPasswordLink = document.getElementById('forgot-password-link');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const actionType = document.getElementById('action-type');
            const nomInput = document.getElementById('nom');
            const prenomInput = document.getElementById('prenom');
            const authForm = document.getElementById('auth-form');

            let isLogin = false;

            if (toggleBtn) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    isLogin = !isLogin;

                    document.getElementById('auth-error-message').classList.add('d-none');
                    document.getElementById('auth-success-message').classList.add('d-none');

                    if (isLogin) {
                        formTitle.textContent = "Ravi de vous revoir !";
                        formSubtitle.textContent = "Saisissez vos identifiants pour planifier ou suivre vos évasions.";
                        toggleText.textContent = "Nouveau voyageur ?";
                        toggleBtn.textContent = "Créer un compte";
                        btnText.textContent = "Se connecter";
                        actionType.value = "login";

                        signupFields.classList.add('d-none');
                        forgotPasswordLink.classList.remove('d-none');
                        nomInput.removeAttribute('required');
                        prenomInput.removeAttribute('required');
                    } else {
                        formTitle.textContent = "Rejoignez l'Aventure";
                        formSubtitle.textContent = "Créez votre compte pour commencer à concevoir vos voyages d'exception.";
                        toggleText.textContent = "Déjà membre ?";
                        toggleBtn.textContent = "Se connecter";
                        btnText.textContent = "Créer mon compte";
                        actionType.value = "signup";

                        signupFields.classList.remove('d-none');
                        forgotPasswordLink.classList.add('d-none');
                        nomInput.setAttribute('required', '');
                        prenomInput.setAttribute('required', '');
                    }
                });
            }

            if (authForm) {
                authForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const errorDiv = document.getElementById('auth-error-message');
                    const successDiv = document.getElementById('auth-success-message');
                    
                    errorDiv.classList.add('d-none');
                    successDiv.classList.add('d-none');

                    const email = document.getElementById('auth-email').value.trim();
                    const password = document.getElementById('auth-password').value;
                    const isSignupAction = actionType.value === 'signup';

                    const payload = isSignupAction 
                        ? { email, password, nom: nomInput.value.trim(), prenom: prenomInput.value.trim() }
                        : { email, password };

                    const endpoint = isSignupAction ? '/api/auth/register' : '/api/auth/login';

                    submitBtn.disabled = true;
                    btnSpinner.classList.remove('d-none');
                    if (isSignupAction) {
                        btnText.textContent = "Envoi de l'e-mail...";
                    } else {
                        btnText.textContent = "Connexion en cours...";
                    }

                    try {
                        const response = await fetch(endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        const data = await response.json();
                        if (!response.ok) throw new Error(data.error || "Une erreur est survenue.");

                        if (isSignupAction) {
                            successDiv.textContent = data.message;
                            successDiv.classList.remove('d-none');
                            authForm.reset();

                            setTimeout(() => {
                                if (!isLogin) toggleBtn.click();
                            }, 4000);
                        } else {
                            localStorage.setItem('token', data.token);
                            localStorage.setItem('user', JSON.stringify(data.user));

                            window.location.href = 'circuits';
                        }
                    } catch (err) {
                        errorDiv.textContent = err.message;
                        errorDiv.classList.remove('d-none');
                    } finally {
                        submitBtn.disabled = false;
                        btnSpinner.classList.add('d-none');
                        btnText.textContent = isSignupAction ? "Créer mon compte" : "Se connecter";
                    }
                });
            }
        })();
    </script>
</body>
</html>
